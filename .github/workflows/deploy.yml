name: Secure Deploy Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔒 Safely writes keys to a background file without triggering log flags
      - name: Inject Secure Keys Natively
        run: |
          echo "const API_KEY = '${{ secrets.GCAL_API_KEY }}';" > credentials.js
          echo "const CLIENT_ID = '${{ secrets.GCAL_CLIENT_ID }}';" >> credentials.js

      - name: Deploy Clean Site to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
