<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Dashboard</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>

    <div class="container">
        <h1>My Planner Dashboard</h1>
        <button id="sync_button" onclick="handleAuthClick()">Sync Google Calendar</button>
        <div id="content" style="white-space: pre-wrap;"></div>
    </div>

    <script>
        /* ==========================================================================
           CREDENTIAL CONFIGURATION - SECURED BY ACTIONS INJECTION PIPELINE
           ========================================================================== */
        const API_KEY = 'AIzaSyDJTOkaRSoOFbD73cWA7jQmsdPnll89QgY'; 
        const CLIENT_ID = '863170089189-9mqk50uut741dut23e00th4vaa8rd6ca.apps.googleusercontent.com';
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

        let tokenClient;
        let gapiInited = false;
        let gsiInited = false;

        // Initialize GAPI Client
        async function gapiStart() {
            try {
                await gapi.client.init({
                    apiKey: API_KEY,
                    discoveryDocs: [DISCOVERY_DOC],
                });
                gapiInited = true;
                maybeEnableButtons();
            } catch (err) {
                console.error('Error initializing GAPI:', err);
            }
        }

        function gapiLoaded() {
            gapi.load('client', gapiStart);
        }

        // Initialize Google Identity Services (GIS)
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', // defined dynamically during user interaction
            });
            gsiInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gsiInited) {
                console.log("Google API and Identity Services ready.");
            }
        }

        // Handle the login button click
        function handleAuthClick() {
            // Force wipe local states to ensure a fresh clean attempt
            localStorage.removeItem('gcal_token');
            gapi.client.setToken(null);

            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                listUpcomingEvents();
            };

            // Force the account selection screen to break the corporate cookie auto-login loop
            tokenClient.requestAccessToken({ 
                prompt: 'select_account',
                hint: '' 
            });
        }

        // Fetch calendar events once authenticated
        async function listUpcomingEvents() {
            try {
                const response = await gapi.client.calendar.events.list({
                    calendarId: 'primary',
                    timeMin: (new Date()).toISOString(),
                    showDeleted: false,
                    singleEvents: true,
                    maxResults: 10,
                    orderBy: 'startTime',
                });
                
                const events = response.result.items;
                if (!events || events.length == 0) {
                    document.getElementById('content').innerText = 'No upcoming events found.';
                    return;
                }

                let output = 'Upcoming events:\n';
                events.forEach((event) => {
                    const start = event.start.dateTime || event.start.date;
                    output += `${start} - ${event.summary}\n`;
                });
                document.getElementById('content').innerText = output;
            } catch (err) {
                document.getElementById('content').innerText = err.message;
            }
        }

        // Core initialization hooks
        window.onload = function () {
            gapiLoaded();
            gisLoaded();
        };
    </script>
</body>
</html>
