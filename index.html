<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="credentials.js"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <style>
        /* Bringing back the custom dashboard look */
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --accent-color: #6c5ce7;
            --accent-hover: #5b4bc4;
            --border-radius: 16px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        #content {
            margin-top: 2rem;
            padding: 1rem;
            background: #f1f2f6;
            border-radius: 12px;
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.6;
            max-height: 250px;
            overflow-y: auto;
            border-left: 4px solid var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ My Planner Dashboard</h1>
        <button id="sync_button" onclick="handleAuthClick()">Sync Google Calendar</button>
        <div id="content" style="white-space: pre-wrap;">Your upcoming schedule will appear here once connected...</div>
    </div>

    <script>
        /* ==========================================================================
           CREDENTIAL CONFIGURATION - AUTOMATICALLY LOADED FROM CREDENTIALS.JS
           ========================================================================== */
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

        let tokenClient;
        let gapiInited = false;
        let gsiInited = false;

        // Initialize GAPI Client
        async function gapiStart() {
            try {
                await gapi.client.init({
                    apiKey: API_KEY,
                    discoveryDocs: [DISCOVERY_DOC],
                });
                gapiInited = true;
                maybeEnableButtons();
            } catch (err) {
                console.error('Error initializing GAPI:', err);
            }
        }

        function gapiLoaded() {
            gapi.load('client', gapiStart);
        }

        // Initialize Google Identity Services (GIS)
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', 
            });
            gsiInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gsiInited) {
                console.log("Google API and Identity Services ready.");
            }
        }

        // Handle the login button click
        function handleAuthClick() {
            localStorage.removeItem('gcal_token');
            gapi.client.setToken(null);

            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                listUpcomingEvents();
            };

            tokenClient.requestAccessToken({ 
                prompt: 'select_account',
                hint: '' 
            });
        }

        // Fetch calendar events once authenticated
        async function listUpcomingEvents() {
            try {
                const response = await gapi.client.calendar.events.list({
                    calendarId: 'primary',
                    timeMin: (new Date()).toISOString(),
                    showDeleted: false,
                    singleEvents: true,
                    maxResults: 10,
                    orderBy: 'startTime',
                });
                
                const events = response.result.items;
                if (!events || events.length == 0) {
                    document.getElementById('content').innerText = 'No upcoming events found.';
                    return;
                }

                let output = '📅 Upcoming Events:\n\n';
                events.forEach((event) => {
                    const start = event.start.dateTime || event.start.date;
                    // Format date nicely
                    const eventDate = new Date(start).toLocaleDateString([], {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'});
                    output += `• ${eventDate}: ${event.summary}\n`;
                });
                document.getElementById('content').innerText = output;
            } catch (err) {
                document.getElementById('content').innerText = err.message;
            }
        }

        // Core initialization hooks
        window.onload = function () {
            gapiLoaded();
            gisLoaded();
        };
    </script>
</body>
</html>
